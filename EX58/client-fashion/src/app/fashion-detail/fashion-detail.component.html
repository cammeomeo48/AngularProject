<div class="container my-5" *ngIf="fashion">
    <nav aria-label="breadcrumb">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a routerLink="/">Home</a></li>
            <li class="breadcrumb-item active" aria-current="page">{{fashion.title}}</li>
        </ol>
    </nav>

    <div class="card border-0 shadow-lg overflow-hidden">
        <div class="row g-0">
            <div class="col-md-5">
                <img [src]="fashion.thumbnail" class="img-fluid w-100 h-100 object-fit-cover" alt="{{fashion.title}}"
                    style="min-height: 400px;">
            </div>
            <div class="col-md-7">
                <div class="card-body p-5">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h1 class="card-title fw-bold mb-0 text-dark">{{fashion.title}}</h1>
                        <span class="badge bg-dark rounded-pill fs-6 px-3 py-2">{{fashion.style}}</span>
                    </div>
                    <p class="text-muted fst-italic mb-4">Listed on {{fashion.createdDate | date:'longDate'}}</p>

                    <div class="fashion-content mb-4 bg-light p-4 rounded text-dark lh-lg"
                        [innerHTML]="fashion.details">
                    </div>

                    <button class="btn btn-outline-dark px-4 py-2 text-uppercase fw-bold shadow-sm" routerLink="/">
                        &larr; Back to Collection
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<div *ngIf="!fashion" class="text-center py-5 my-5">
    <div class="spinner-border text-dark" role="status" style="width: 3rem; height: 3rem;">
        <span class="visually-hidden">Loading...</span>
    </div>
    <p class="mt-3 text-muted">Loading fashion details...</p>
</div>
