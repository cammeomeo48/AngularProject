<div class="card shadow-sm mt-4">
    <div class="card-header bg-white">
        <h3 class="mb-0">Exercise 60: Basic Cookie Operations</h3>
    </div>
    <div class="card-body text-center">
        <p class="text-muted mb-4">Click the buttons below to interact with the backend cookie APIs.</p>

        <div class="d-flex justify-content-center gap-3 mb-4">
            <button class="btn btn-primary" (click)="createCookie()">Create Cookies</button>
            <button class="btn btn-info text-white" (click)="readCookie()">Read Cookies</button>
            <button class="btn btn-danger" (click)="clearCookie()">Clear Account Cookie</button>
        </div>

        <div class="card bg-light text-start mx-auto" style="max-width: 500px;" *ngIf="outputMessage">
            <div class="card-body">
                <h5 class="card-title text-muted">Output:</h5>
                <!-- The server returns some HTML (like <br/>), so we use innerHTML -->
                <div class="mt-2 fs-5" [innerHTML]="outputMessage"></div>
            </div>
        </div>
    </div>
</div>
