<div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Your Shopping Cart</h2>
    <div *ngIf="alertMessage" class="alert alert-info py-2 px-3 mb-0">{{ alertMessage }}</div>
</div>

<div class="card shadow-sm mb-4" *ngIf="cartItems.length > 0; else emptyCart">
    <div class="card-body p-0">
        <div class="table-responsive">
            <table class="table table-hover mb-0 align-middle">
                <thead class="table-light">
                    <tr>
                        <th class="ps-4">Product</th>
                        <th>Price</th>
                        <th style="width: 150px;">Quantity</th>
                        <th>Subtotal</th>
                        <th class="pe-4 text-end">Action</th>
                    </tr>
                </thead>
                <tbody>
                    <tr *ngFor="let item of cartItems">
                        <td class="ps-4">
                            <div class="d-flex align-items-center">
                                <img [src]="item.image || 'https://via.placeholder.com/50'" class="rounded me-3"
                                    style="width: 50px; height: 50px; object-fit: cover;">
                                <span class="fw-bold">{{ item.title }}</span>
                            </div>
                        </td>
                        <td>${{ item.price }}</td>
                        <td>
                            <input type="number" class="form-control text-center w-75" [(ngModel)]="item.quantity"
                                (change)="updateQuantity(item._id, item.quantity)" min="1">
                        </td>
                        <td class="fw-bold">${{ item.price * item.quantity | number:'1.2-2' }}</td>
                        <td class="pe-4 text-end">
                            <button class="btn btn-sm btn-danger" (click)="removeItem(item._id)">Remove</button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
    <div class="card-footer bg-white p-4">
        <div class="d-flex justify-content-between align-items-center">
            <a routerLink="/products" class="btn btn-outline-secondary">← Continue Shopping</a>
            <h4 class="mb-0">Total: <span class="text-primary fw-bold">${{ cartTotal | number:'1.2-2' }}</span></h4>
        </div>
    </div>
</div>

<ng-template #emptyCart>
    <div class="text-center py-5 bg-light rounded shadow-sm">
        <h3 class="text-muted mb-3">Your cart is currently empty.</h3>
        <a routerLink="/products" class="btn btn-primary btn-lg mt-2">Start Shopping</a>
    </div>
</ng-template>
