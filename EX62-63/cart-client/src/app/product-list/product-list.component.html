<div class="row align-items-center mb-4">
    <div class="col">
        <h2>Available Products</h2>
    </div>
    <div class="col-auto">
        <div *ngIf="alertMessage" class="alert alert-success py-2 px-3 mb-0 fade show" role="alert">
            {{ alertMessage }}
        </div>
    </div>
</div>

<div class="row row-cols-1 row-cols-md-3 g-4">
    <div class="col" *ngFor="let product of products">
        <div class="card h-100 shadow-sm">
            <img [src]="product.image" class="card-img-top" alt="Product Image"
                style="height: 200px; object-fit: cover;">
            <div class="card-body d-flex flex-column">
                <h5 class="card-title">{{ product.title }}</h5>
                <p class="card-text text-muted flex-grow-1">{{ product.description }}</p>
                <h4 class="text-primary mb-3">${{ product.price }}</h4>
                <button class="btn btn-outline-primary mt-auto w-100 fw-bold" (click)="addToCart(product._id)">
                    ADD TO CART
                </button>
            </div>
        </div>
    </div>
</div>
